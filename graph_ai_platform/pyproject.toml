[project] name = "graph-ai-platform" version = "0.1.0" description = "Python-first Visual AI Programming Platform: Python ↔ Graph bidirectional editing" readme = "README.md" requires-python = ">=3.11" license = {text = "AGPL-3.0-or-later"} authors = [     {name = "Graph AI Platform Team", email = "dev@graph-ai.local"} ] keywords = ["visual-programming", "ai", "python", "ast", "graph", "ir", "code-generation"] classifiers = [     "Development Status :: 3 - Alpha",     "Intended Audience :: Developers",     "License :: OSI Approved :: GNU Affero General Public License v3",     "Programming Language :: Python :: 3.11",     "Programming Language :: Language :: Language :: Python :: 3.12",     "Topic :: Software Development :: Code Generators",     "Topic :: Software Development :: Libraries :: Python Modules", ]  dependencies = [     "fastapi>=0.110.0",     "uvicorn[standard]>=0.29.0",     "pydantic>=2.7.0",     "pydantic-settings>=2.3.0",     "libcst>=1.5.0",     "typing-extensions>=4.11.0",     "python-multipart>=0.0.9",     "python-json-logger>=2.0.7",     "loguru>=0.7.2",     "httpx>=0.27.0",     "anyio>=4.3.0", ]  [dependency-groups] dev = [     "pytest>=8.2.0",     "pytest-asyncio>=0.23.0",     "pytest-cov>=5.0.0",     "pytest-mock>=3.14.0",     "ruff>=0.5.0",     "mypy>=1.10.0",     "pre-commit>=3.7.0",     "pytest-xdist>=3.5.0",     "pytest-instafail>=0.5.0", ]  [tool.ruff] line-length = 100 target-version = "py311" select = ["E", "F", "I", "UP", "W", "C4", "PT", "PTH", "RUF", "RET", "SIM", "TID", "TRY"] ignore = ["S101", "TRY003"] fixable = ["ALL"] unfixable = ["TID252"]  [tool.ruff.format] quote-style = "double" indent-style = "space" skip-magic-trailing-comma = true  [tool.mypy] python_version = "3.11" warn_return_any = true warn_unused_ignores = true disallow_untyped_defs = true strict = true namespace-packages = true  [tool.pytest.ini_options] asyncio_mode = "auto" testpaths = ["tests"] python_files = ["test_*.py"] python_functions = ["test_*"] addopts = "-ra -q --strict-markers"  [tool.coverage.run] source = ["packages", "services"] omit = ["tests/*", "*/__pycache__/*"]  [tool.coverage.report] exclude_lines = ["pragma: no cover", "def __repr__", "raise AssertionError", "raise NotImplementedError"] precision = 2  [build-system] requires = ["setuptools>=68.0", "wheel"] build-backend = "setuptools.build_meta"