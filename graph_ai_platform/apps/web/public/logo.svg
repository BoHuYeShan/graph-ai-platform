<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <!-- 暗色科技风渐变 -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="g4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="110" cy="110" r="100" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>

  <!-- 拼图四块 — 紫→青渐变 -->
  <!-- 左上 -->
  <path d="M 35,35 L 95,35 Q 95,20 110,35 Q 125,50 110,65 Q 95,80 95,65 L 95,95 L 35,95 Z"
        fill="url(#g1)" filter="url(#glow)" opacity="0.9"/>
  <!-- 右上 -->
  <path d="M 110,35 L 170,35 Q 170,50 185,50 Q 170,65 170,65 L 170,95 L 110,95 Q 110,80 125,65 Q 140,50 125,35 Z"
        fill="url(#g2)" filter="url(#glow)" opacity="0.85"/>
  <!-- 左下 -->
  <path d="M 35,95 L 95,95 L 95,155 Q 80,155 80,170 Q 80,185 95,185 L 35,185 Z"
        fill="url(#g3)" filter="url(#glow)" opacity="0.8"/>
  <!-- 右下 -->
  <path d="M 110,95 L 170,95 L 170,155 Q 170,170 185,170 Q 170,185 170,185 L 110,185 Q 110,170 125,170 Q 140,170 125,155 Z"
        fill="url(#g4)" filter="url(#glow)" opacity="0.75"/>

  <!-- 中心箭头 (run) -->
  <polygon points="100,112 128,130 100,148" fill="#1a1a2e" opacity="0.8"/>
  <polygon points="98,110 130,130 98,150" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
</svg>
